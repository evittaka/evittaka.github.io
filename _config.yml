# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Evita Karietaite
email: e.karietaite@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Data Scientist (Applied Machine Learning \& Financial Analytics) with experience in building predictive models, statistical analysis, and Python-based data automation across financial risk and industrial domains. MSc in Mathematical Modelling and Computation (Machine Learning \& Data Science, DTU), with industry experience from Novo Nordisk and Danske Bank. Focused on time-series forecasting, production-oriented machine learning, and scalable data-driven solutions.
twitter_username: username
github_username: evittaka
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
repository: evittaka/evittaka.github.io
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Evita Karietaite"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "MSc in Mathematical Modelling and Computation (Machine Learning & Data Science, DTU), with industry experience from Novo Nordisk and Danske Bank."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/evittaka"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/evita-karietait%C4%97-57a723166"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/evittaka"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/evita-karietait%C4%97-57a723166"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
      classes: wide

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

collections:
  projects:
    output: true

main:
  - title: "About"
    url: /about/
  - title: "Projects"
    url: /projects/

  - title: "Cat/Dog Classifier"
    url: /projects/cat-dog-classifier/


